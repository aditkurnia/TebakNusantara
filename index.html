<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizBlast!</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- PAGE: HOME -->
  <div id="page-home" class="page active">
    <div class="stars"></div>

    <div class="home-container">
      <div class="logo-wrap">
        <div class="logo-glow">QUIZ</div>
        <div class="logo-main">BLAST<span class="logo-bang">!</span></div>
        <div class="logo-sub">Uji Pengetahuanmu Sekarang</div>
      </div>

      <!-- Name Modal -->
      <div class="name-card" id="name-card">
        <div class="name-card-label">Masukkan Namamu</div>
        <input type="text" id="name-input" class="name-input" placeholder="Nama kamu..." maxlength="20" autocomplete="off" />
        <button class="btn btn-primary" id="btn-save-name">SIMPAN ✓</button>
      </div>

      <!-- Welcome + Buttons -->
      <div class="welcome-area" id="welcome-area" style="display:none">
        <div class="welcome-text">Halo, <span id="display-name" class="highlight-name"></span>! 👋</div>
        <div class="home-buttons">
          <button class="btn btn-start" id="btn-start">
            <span class="btn-icon">▶</span> MULAI MAIN
          </button>
          <button class="btn btn-score" id="btn-show-score">
            <span class="btn-icon">🏆</span> PAPAN SKOR
          </button>
        </div>
      </div>
    </div>

    <!-- Scoreboard Modal -->
    <div class="modal-overlay" id="score-modal">
      <div class="modal-box">
        <div class="modal-title">🏆 PAPAN SKOR</div>
        <div class="score-list" id="score-list"></div>
        <button class="btn btn-close" id="btn-close-score">TUTUP ✕</button>
      </div>
    </div>
  </div>

  <!-- PAGE: GAME -->
  <div id="page-game" class="page">
    <div class="game-header">
      <div class="game-info">
        <div class="question-counter" id="question-counter">Soal <span id="q-num">1</span> / 10</div>
        <div class="score-display">Skor: <span id="live-score">0</span></div>
      </div>
      <div class="timer-wrap">
        <svg class="timer-ring" viewBox="0 0 60 60">
          <circle class="ring-bg" cx="30" cy="30" r="26"/>
          <circle class="ring-progress" id="ring-progress" cx="30" cy="30" r="26"/>
        </svg>
        <div class="timer-num" id="timer-num">10</div>
      </div>
    </div>

    <div class="clue-bar">
      <div class="clue-label">CLUE:</div>
      <button class="clue-btn" id="clue-1" data-index="0">💡 1</button>
      <button class="clue-btn" id="clue-2" data-index="1">💡 2</button>
      <button class="clue-btn" id="clue-3" data-index="2">💡 3</button>
    </div>

    <div class="clue-display" id="clue-display"></div>

    <div class="question-card" id="question-card">
      <div class="question-text" id="question-text">Memuat soal...</div>
    </div>

    <div class="options-grid" id="options-grid">
      <button class="option-btn" data-idx="0"><span class="opt-label">A</span><span class="opt-text" id="opt-0"></span></button>
      <button class="option-btn" data-idx="1"><span class="opt-label">B</span><span class="opt-text" id="opt-1"></span></button>
      <button class="option-btn" data-idx="2"><span class="opt-label">C</span><span class="opt-text" id="opt-2"></span></button>
      <button class="option-btn" data-idx="3"><span class="opt-label">D</span><span class="opt-text" id="opt-3"></span></button>
    </div>

    <div class="feedback-overlay" id="feedback-overlay">
      <div class="feedback-icon" id="feedback-icon"></div>
      <div class="feedback-text" id="feedback-text"></div>
    </div>
  </div>

  <!-- PAGE: RESULT -->
  <div id="page-result" class="page">
    <div class="result-container">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-title" id="result-title">LUAR BIASA!</div>
      <div class="result-name" id="result-name"></div>
      <div class="result-score-wrap">
        <div class="result-score-label">SKOR AKHIR</div>
        <div class="result-score" id="result-score">0</div>
        <div class="result-max">dari 1000</div>
      </div>
      <div class="result-correct" id="result-correct">0 dari 10 soal benar</div>
      <div class="result-buttons">
        <button class="btn btn-start" id="btn-play-again">▶ MAIN LAGI</button>
        <button class="btn btn-score" id="btn-home">🏠 HOME</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
